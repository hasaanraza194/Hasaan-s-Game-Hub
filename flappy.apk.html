<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const SCALE = Math.min(
  Math.floor(window.innerWidth  / 288),
  Math.floor(window.innerHeight / 512)
) || 1;
const W = 288, H = 512;
canvas.width  = W * SCALE;
canvas.height = H * SCALE;
ctx.scale(SCALE, SCALE);

// ─── Bird sprite frames ──────────────────────────────────────────────────
function makeBirdFrame(wingPos) {
  const bc = document.createElement('canvas');
  bc.width = 34; bc.height = 24;
  const bx = bc.getContext('2d');
  const p = (x,y,w,h,c) => { bx.fillStyle=c; bx.fillRect(x,y,w,h); };

  // Wing positions: 0=up, 1=mid, 2=down
  if (wingPos===0) { p(8,3,14,5,'#d09000'); p(8,6,14,4,'#d09000'); }
  else if (wingPos===1) { p(8,9,16,5,'#d09000'); }
  else { p(8,14,14,5,'#d09000'); p(10,18,10,4,'#d09000'); }

  // Body
  p(4,8, 24,13,'#f5c623'); p(6,6, 20,15,'#f5c623'); p(7,5, 18,16,'#f5c623');
  // Belly
  p(9,13,12,6,'#f8f0c0'); p(7,14,16,4,'#f8f0c0');
  // Outline top
  p(6,4, 18,2,'#543847'); p(5,6, 2,12,'#543847'); p(25,7, 2,11,'#543847');
  p(7,19,14,2,'#543847'); p(21,18,5,2,'#543847');
  // Eye
  p(19,7, 9,8,'#ffffff'); p(18,8, 10,6,'#ffffff'); p(22,9, 5,4,'#543847'); p(23,9,2,2,'#ffffff');
  // Beak
  p(26,12,7,3,'#f07000'); p(27,11,6,1,'#f07000'); p(27,15,6,1,'#d06000');
  p(26,11,1,1,'#543847'); p(32,12,1,4,'#543847'); p(26,15,1,1,'#543847');

  return bc;
}
const birdFrames = [makeBirdFrame(0), makeBirdFrame(1), makeBirdFrame(2)];

// ─── Constants ───────────────────────────────────────────────────────────
const GROUND_Y = H - 112;
const PIPE_W   = 52;
const PIPE_GAP = 140;
const PIPE_SPD = 2.5;
const GRAV     = 0.5;
const FLAP_V   = -8.5;

// ─── State ────────────────────────────────────────────────────────────────
let state = 'idle';
let score = 0;
let best  = parseInt(localStorage.getItem('fb_best') || '0');
let bird, pipes, particles, groundX, clouds;
let flashAlpha = 0, deathTimer = 0;
let panelY = H, btnY = H;
let tapPulse = 0, tapDir = 1;
let idleBobT = 0;

function init() {
  bird = { x:70, y:H/2-20, vy:0, angle:0, frame:0, tick:0 };
  pipes = []; particles = []; groundX = 0;
  flashAlpha = 0; deathTimer = 0;
  panelY = H; btnY = H;
  score = 0;
  clouds = [
    {x:30,  y:55, s:0.9},
    {x:170, y:28, s:1.05},
    {x:240, y:78, s:0.75},
  ];
}

// ─── Input ────────────────────────────────────────────────────────────────
function flap() {
  if (state==='dying') return;
  if (state==='dead')  { state='idle'; init(); return; }
  if (state==='idle')  { state='playing'; }
  bird.vy = FLAP_V;
  bird.frame = 0;
  spawnPuff(bird.x, bird.y+10);
}
document.addEventListener('keydown', e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();flap();}
});
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e=>{e.preventDefault();flap();},{passive:false});

// ─── Particles ────────────────────────────────────────────────────────────
function spawnPuff(x,y) {
  for(let i=0;i<5;i++){
    const a=Math.random()*Math.PI*2, s=1+Math.random()*2;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,r:2+Math.random()*2,life:1,decay:0.06+Math.random()*0.04,col:'rgba(255,255,255,0.8)'});
  }
}
function spawnBurst(x,y){
  const cols=['#f5c623','#ff6b6b','#ffffff','#4ec0ca','#73bf2e','#ffaa00'];
  for(let i=0;i<22;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,r:2+Math.random()*4,life:1,decay:0.03+Math.random()*0.04,col:cols[i%cols.length]});
  }
}

// ─── Spawn pipe ───────────────────────────────────────────────────────────
function spawnPipe() {
  const minTop=55, maxTop=GROUND_Y-PIPE_GAP-55;
  pipes.push({x:W+10, top:minTop+Math.random()*(maxTop-minTop), scored:false});
}

// ─── Collision ────────────────────────────────────────────────────────────
function hitting() {
  if(bird.y+10>=GROUND_Y) return true;
  if(bird.y-10<=0)        return true;
  for(const p of pipes){
    const inX=bird.x+10>p.x+3 && bird.x-10<p.x+PIPE_W-3;
    if(inX && (bird.y-10<p.top || bird.y+10>p.top+PIPE_GAP)) return true;
  }
  return false;
}

// ─── Draw helpers ─────────────────────────────────────────────────────────
function drawSky(){
  const g=ctx.createLinearGradient(0,0,0,GROUND_Y);
  g.addColorStop(0,'#4ec0ca'); g.addColorStop(1,'#70dce8');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,GROUND_Y);
}

function drawCloud(x,y,s){
  ctx.fillStyle='#ffffff';
  [[10,8,40,20],[4,14,52,14],[18,2,26,26],[14,4,34,24]].forEach(([cx,cy,cw,ch])=>{
    ctx.fillRect(x+cx*s, y+cy*s, cw*s, ch*s);
  });
}

function drawPipe(px, top){
  const botY=top+PIPE_GAP, botH=GROUND_Y-botY;
  [[0,top,true],[botY,botH,false]].forEach(([py,ph,isTop])=>{
    if(ph<=0)return;
    // Body gradient
    const g=ctx.createLinearGradient(px,0,px+PIPE_W,0);
    g.addColorStop(0,'#3a8000'); g.addColorStop(0.15,'#73bf2e');
    g.addColorStop(0.5,'#5aaa20'); g.addColorStop(0.8,'#3a8000'); g.addColorStop(1,'#2a6000');
    ctx.fillStyle=g; ctx.fillRect(px+4,py,PIPE_W-8,ph);
    // Shine
    ctx.fillStyle='rgba(180,255,100,0.25)'; ctx.fillRect(px+10,py,6,ph);
    // Cap
    const cy=isTop?py+ph-16:py;
    const cg=ctx.createLinearGradient(px,0,px+PIPE_W,0);
    cg.addColorStop(0,'#2a7000'); cg.addColorStop(0.15,'#68b020');
    cg.addColorStop(0.5,'#50a015'); cg.addColorStop(1,'#2a6000');
    ctx.fillStyle=cg; ctx.fillRect(px,cy,PIPE_W,16);
    ctx.fillStyle='rgba(150,230,80,0.2)'; ctx.fillRect(px+8,cy+2,6,12);
    ctx.fillStyle=isTop?'rgba(0,0,0,0.2)':'rgba(0,0,0,0.15)';
    ctx.fillRect(px, isTop?cy+13:cy, PIPE_W, 3);
    // Outline
    ctx.strokeStyle='#1e5a00'; ctx.lineWidth=1.5;
    ctx.strokeRect(px+0.5,py+0.5,PIPE_W-1,ph-1);
  });
}

function drawGround(gx){
  // Grass
  ctx.fillStyle='#ded895'; ctx.fillRect(0,GROUND_Y,W,22);
  ctx.fillStyle='#c8c068'; ctx.fillRect(0,GROUND_Y+18,W,4);
  // Dirt
  ctx.fillStyle='#c8a44a'; ctx.fillRect(0,GROUND_Y+22,W,H-GROUND_Y-22);
  // Grid
  ctx.fillStyle='rgba(0,0,0,0.07)';
  const tw=32, off=((W*10-gx)%tw);
  for(let x=-tw+off;x<W+tw;x+=tw) ctx.fillRect(x,GROUND_Y,2,22);
  // Bumps
  ctx.fillStyle='#e8e898';
  for(let x=-tw+off;x<W+tw;x+=tw){
    ctx.fillRect(x+5,GROUND_Y-2,8,4);
    ctx.fillRect(x+20,GROUND_Y-3,6,3);
  }
  // Top line
  ctx.fillStyle='#b09850'; ctx.fillRect(0,GROUND_Y+22,W,2);
}

function numTex(n,x,y,sz){
  ctx.save();
  ctx.font=`bold ${sz}px 'Arial Black',Arial`;
  ctx.textAlign='center';
  ctx.lineWidth=sz*0.15; ctx.strokeStyle='#543847';
  ctx.strokeText(n,x,y);
  ctx.fillStyle='#ffffff'; ctx.fillText(n,x,y);
  ctx.restore();
}
function drawScore(n,cx,cy,sz){
  const s=String(n);
  const sp=sz*1.05;
  const tw=(s.length-1)*sp;
  s.split('').forEach((c,i)=>numTex(c, cx-tw/2+i*sp, cy, sz));
}

function drawMedal(x,y,sc){
  const col=sc>=40?'#a8d8ff':sc>=30?'#e8e0d0':sc>=20?'#ffd040':'#d07030';
  const brd=sc>=40?'#4080c0':sc>=30?'#909090':sc>=20?'#c09000':'#804010';
  ctx.beginPath(); ctx.arc(x,y,20,0,Math.PI*2);
  ctx.fillStyle=col; ctx.fill();
  ctx.strokeStyle=brd; ctx.lineWidth=3; ctx.stroke();
  ctx.font='bold 9px Arial'; ctx.fillStyle='#fff'; ctx.textAlign='center';
  ctx.fillText(sc>=40?'PLAT':sc>=30?'GOLD':sc>=20?'SILV':'BRNZ',x,y+4);
}

function drawPanel(){
  const pw=220,ph=165,px=W/2-pw/2,py=panelY;
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(px+4,py+4,pw,ph);
  ctx.fillStyle='#dfd9c8'; ctx.fillRect(px,py,pw,ph);
  ctx.fillStyle='#ede7d4'; ctx.fillRect(px,py,pw,42);
  ctx.fillStyle='#c8b88a'; ctx.fillRect(px,py+42,pw,3);
  // Title
  ctx.font='bold 18px Arial'; ctx.textAlign='center';
  ctx.lineWidth=3; ctx.strokeStyle='#c87030'; ctx.strokeText('SCORE',W/2,py+29);
  ctx.fillStyle='#ffffff'; ctx.fillText('SCORE',W/2,py+29);
  // Labels
  ctx.font='13px Arial'; ctx.fillStyle='#9e9080'; ctx.textAlign='right';
  ctx.fillText('SCORE',px+pw-14,py+64);
  ctx.fillText('BEST', px+pw-14,py+114);
  // Values
  ctx.font='bold 26px Arial'; ctx.lineWidth=2; ctx.strokeStyle='#c8b88a';
  ctx.strokeText(score,px+pw-14,py+88); ctx.fillStyle='#fff'; ctx.fillText(score,px+pw-14,py+88);
  ctx.strokeText(best, px+pw-14,py+136); ctx.fillText(best, px+pw-14,py+136);
  // Medal
  if(score>=10) drawMedal(px+45,py+105,score);
  // New best
  if(score>0&&score>=best){
    ctx.fillStyle='#f0c040'; ctx.fillRect(px+pw-96,py+70,52,18);
    ctx.font='bold 10px Arial'; ctx.fillStyle='#fff'; ctx.textAlign='center';
    ctx.fillText('NEW!',px+pw-70,py+83);
  }
  // Border
  ctx.strokeStyle='#b09870'; ctx.lineWidth=3;
  ctx.strokeRect(px+1.5,py+1.5,pw-3,ph-3);
}

function drawButtons(){
  const bw=100,bh=40;
  const lx=W/2-106, rx=W/2+6;
  [[lx,'#e07020','#f09040','#804010','▶  OK'],[rx,'#3090d0','#40a8e8','#105080','★  BEST']].forEach(([x,dk,lt,brd,lbl])=>{
    ctx.fillStyle=dk; ctx.fillRect(x,btnY,bw,bh);
    ctx.fillStyle=lt; ctx.fillRect(x,btnY,bw,bh-6);
    ctx.strokeStyle=brd; ctx.lineWidth=3; ctx.strokeRect(x+1.5,btnY+1.5,bw-3,bh-3);
    ctx.font='bold 15px Arial'; ctx.textAlign='center';
    ctx.lineWidth=2; ctx.strokeStyle=brd; ctx.strokeText(lbl,x+bw/2,btnY+26);
    ctx.fillStyle='#fff'; ctx.fillText(lbl,x+bw/2,btnY+26);
  });
}

function drawLogo(y){
  ctx.save(); ctx.textAlign='center';
  ctx.font="bold 38px 'Arial Black',Arial";
  ctx.fillStyle='#543847'; ctx.fillText('Flappy Bird',W/2+3,y+3);
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=2; ctx.strokeText('Flappy Bird',W/2,y);
  ctx.fillStyle='#f5c623'; ctx.fillText('Flappy Bird',W/2,y);
  ctx.restore();
}

// ─── Loop ─────────────────────────────────────────────────────────────────
let prev=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-prev)/16.67,3); prev=ts;

  // Update
  if(state==='playing'){
    bird.vy+=GRAV*dt; bird.y+=bird.vy*dt;
    bird.angle=Math.min(Math.PI*0.4,Math.max(-Math.PI*0.28,bird.vy*0.065));
    bird.tick+=dt; if(bird.tick>5){bird.tick=0;bird.frame=(bird.frame+1)%3;}
    groundX=(groundX+PIPE_SPD*dt)%W;
    clouds.forEach(c=>{c.x-=0.4*dt; if(c.x<-70)c.x=W+10;});
    if(!pipes.length||pipes[pipes.length-1].x<W-155) spawnPipe();
    pipes.forEach(p=>p.x-=PIPE_SPD*dt);
    pipes=pipes.filter(p=>p.x>-PIPE_W-5);
    pipes.forEach(p=>{
      if(!p.scored&&p.x+PIPE_W<bird.x){
        p.scored=true; score++;
        if(score>best){best=score;localStorage.setItem('fb_best',best);}
      }
    });
    if(hitting()){state='dying';flashAlpha=1;spawnBurst(bird.x,bird.y);deathTimer=0;}

  } else if(state==='dying'){
    deathTimer+=dt; flashAlpha=Math.max(0,flashAlpha-0.07*dt);
    bird.vy+=0.9*dt; bird.y+=bird.vy*dt;
    bird.angle=Math.min(Math.PI*0.5,bird.angle+0.09*dt);
    groundX=(groundX+PIPE_SPD*dt)%W;
    if(deathTimer>40){state='dead'; panelY=H; btnY=H;}

  } else if(state==='idle'){
    idleBobT+=dt*0.04;
    bird.y=H/2-20+Math.sin(idleBobT*Math.PI*2)*8;
    bird.angle=0;
    bird.tick+=dt; if(bird.tick>8){bird.tick=0;bird.frame=(bird.frame+1)%3;}
    groundX=(groundX+PIPE_SPD*dt)%W;
    clouds.forEach(c=>{c.x-=0.4*dt; if(c.x<-70)c.x=W+10;});
    tapPulse+=0.04*tapDir*dt;
    if(tapPulse>=1)tapDir=-1; if(tapPulse<=0)tapDir=1;
    tapPulse=Math.max(0,Math.min(1,tapPulse));
    panelY=H; btnY=H;
  } else if(state==='dead'){
    groundX=(groundX+PIPE_SPD*dt)%W;
  }

  // Slide panel
  const panelTarget=(state==='dead')?H/2-100:H;
  const btnTarget  =(state==='dead')?H/2+88:H;
  panelY+=(panelTarget-panelY)*0.13*dt;
  btnY  +=(btnTarget  -btnY  )*0.13*dt;

  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.2*dt;p.life-=p.decay*dt;});
  particles=particles.filter(p=>p.life>0);

  // Draw
  drawSky();
  clouds.forEach(c=>{drawCloud(c.x,c.y,c.s); drawCloud(c.x+W,c.y,c.s);});
  pipes.forEach(p=>drawPipe(p.x,p.top));
  drawGround(groundX);

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // Bird
  ctx.save();
  ctx.translate(bird.x,bird.y);
  ctx.rotate(bird.angle);
  ctx.drawImage(birdFrames[bird.frame],-17,-12);
  ctx.restore();

  // Flash
  if(flashAlpha>0){
    ctx.fillStyle=`rgba(255,255,255,${flashAlpha})`;
    ctx.fillRect(0,0,W,H);
  }

  // UI
  if(state==='playing') drawScore(score,W/2,55,28);

  if(state==='idle'){
    drawLogo(H/2-68);
    // Best label
    ctx.font='11px Arial'; ctx.fillStyle='rgba(255,255,255,0.75)';
    ctx.textAlign='center'; ctx.fillText('BEST',W/2,36);
    drawScore(best,W/2,55,22);
    // Tap prompt
    ctx.globalAlpha=tapPulse*0.9+0.1;
    ctx.font="bold 14px 'Arial Black',Arial"; ctx.textAlign='center';
    ctx.lineWidth=3; ctx.strokeStyle='#543847';
    ctx.strokeText('TAP or SPACE to play',W/2,H/2+80);
    ctx.fillStyle='#ffffff'; ctx.fillText('TAP or SPACE to play',W/2,H/2+80);
    ctx.globalAlpha=1;
  }

  if(state==='dead'||state==='dying'){
    drawScore(score,W/2,55,28);
    // Game over
    ctx.save(); ctx.textAlign='center';
    ctx.font="bold 36px 'Arial Black',Arial";
    ctx.lineWidth=4; ctx.strokeStyle='#543847';
    ctx.strokeText('GAME OVER',W/2+2,126);
    ctx.fillStyle='#f5c623'; ctx.fillText('GAME OVER',W/2,123);
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=1.5;
    ctx.strokeText('GAME OVER',W/2,123);
    ctx.restore();
  }

  if(state==='dead'){
    drawPanel();
    drawButtons();
  }
}

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
